<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia Digital - Entrenador Pro Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b27;
    --surface2: #1e2536;
    --border: #2a3347;
    --gold: #d4a843;
    --gold-dim: #a07830;
    --text: #e8e2d5;
    --text-muted: #7a8399;
    --success: #4eb87a;
    --error: #e05c5c;
    --info: #5b9bd5;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    padding: 2rem 1rem;
    text-align: center;
    background: linear-gradient(to bottom, #1a1f2e, var(--bg));
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem;
    width: 100%;
    flex: 1;
  }

  .screen { display: none; animation: fadeIn 0.4s ease-out; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  /* SYNC STATUS */
  #sync-indicator {
    position: fixed;
    top: 1rem;
    right: 1rem;
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 1000;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
  .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }

  /* UPLOAD & DRIVE */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    margin-bottom: 1.5rem;
  }
  .upload-area:hover { border-color: var(--gold); background: rgba(212,168,67,0.05); }
  .upload-area i { font-size: 2.5rem; color: var(--gold-dim); display: block; margin-bottom: 0.5rem; }

  .drive-section {
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    gap: 0.6rem;
    font-family: inherit;
    font-size: 0.95rem;
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { background: #e5b954; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .btn-google { background: #fff; color: #444; border: 1px solid #ddd; width: 100%; max-width: 300px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* TOPICS & SELECTION */
  .selection-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
    align-items: center;
    justify-content: space-between;
    padding: 1rem;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .topic-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-left: 4px solid var(--gold-dim);
    transition: background 0.2s;
  }
  .topic-item:hover { background: #252d3f; }

  .topic-checkbox {
    width: 22px;
    height: 22px;
    cursor: pointer;
    accent-color: var(--gold);
  }

  .topic-content { flex: 1; }

  .quiz-config-panel {
    margin-top: 1rem;
    padding: 1rem;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .input-group label { font-size: 0.9rem; color: var(--text-muted); }
  .input-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem;
    border-radius: 6px;
    width: 80px;
    font-family: inherit;
    font-weight: bold;
    text-align: center;
  }

  /* NAVIGATION */
  nav {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    display: flex;
    padding: 0.6rem;
    border-top: 1px solid var(--border);
    z-index: 100;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted); font-size: 0.7rem;
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 18px; height: 18px; }

  .loading-spinner { 
    display: inline-block; width: 1rem; height: 1rem; 
    border: 2px solid var(--gold-dim); border-top-color: transparent; 
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #modal-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000;
    padding: 1rem;
  }
  .modal { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="sync-indicator">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Sin conexión</span>
</div>

<header>
  <h1>Academia Digital</h1>
  <p style="color: var(--text-muted); font-size: 0.9rem">Entrenador Personal Cloud</p>
</header>

<div class="container">

  <!-- CARGA -->
  <section id="screen-upload" class="screen active">
    <div class="card">
      <h2 style="margin-bottom: 1rem; font-size: 1.3rem">Importar Temario</h2>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <i>📁</i>
        <p>Subir archivos <strong>.txt</strong></p>
        <span style="font-size: 0.75rem; color: var(--text-muted)">Desde tu dispositivo</span>
        <input type="file" id="file-input" multiple accept=".txt" style="display:none" onchange="handleFiles(this.files)">
      </div>

      <div class="drive-section">
        <button id="auth-btn" class="btn btn-google" onclick="handleAuthClick()">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_HiRes_Logo.png" width="16" alt="G">
          Conectar Google Drive
        </button>
        <button id="signout-btn" class="btn btn-secondary" style="display:none" onclick="handleSignoutClick()">Cerrar Drive</button>
        <div id="drive-status" style="margin-top: 1rem; font-size: 0.85rem"></div>
        <div id="drive-file-list" style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
      </div>
    </div>
  </section>

  <!-- TEMARIOS -->
  <section id="screen-topics" class="screen">
    <div id="no-topics-msg" style="text-align:center; padding: 3rem 0; display:none;">
      <p style="color: var(--text-muted); margin-bottom: 1rem;">No tienes temas en la nube.</p>
      <button class="btn btn-primary" onclick="showScreen('upload')">Importar Temas</button>
    </div>
    
    <div id="topics-content">
      <h2 style="margin-bottom: 1.2rem; font-size: 1.3rem">Gestión de Temario</h2>
      
      <div class="selection-controls">
        <button class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.8rem" onclick="toggleSelectAll()">Seleccionar Todo</button>
        <span id="selected-count" style="font-size: 0.85rem; color: var(--gold)">0 temas seleccionados</span>
      </div>

      <div id="topics-list"></div>

      <div class="quiz-config-panel" id="quiz-config-panel" style="display: none;">
        <div class="input-group">
          <label for="num-questions">Número de preguntas:</label>
          <input type="number" id="num-questions" value="10" min="1" max="100">
          <span id="max-available" style="font-size: 0.75rem; color: var(--text-muted)"></span>
        </div>
        <button class="btn btn-primary" style="width: 100%" onclick="startCustomQuiz()">Iniciar Test con Selección</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz" class="screen">
    <div class="card">
      <div id="quiz-header" style="display:flex; justify-content:space-between; margin-bottom:1.5rem; font-size:0.85rem; color:var(--text-muted)">
        <span id="quiz-topic-name"></span>
        <span id="quiz-progress"></span>
      </div>
      <div id="quiz-body">
        <div id="q-text" style="font-size:1.2rem; margin-bottom:1.5rem; line-height:1.4"></div>
        <div id="q-options" style="display:grid; gap:0.8rem"></div>
        <div id="q-feedback" style="margin-top:1.5rem; padding:1rem; border-radius:10px; display:none; font-size:0.9rem"></div>
        <div style="margin-top:1.5rem; text-align:right">
          <button id="next-btn" class="btn btn-primary" style="display:none" onclick="nextQuestion()">Siguiente</button>
        </div>
      </div>
    </div>
  </section>

  <!-- STATS -->
  <section id="screen-stats" class="screen">
    <div class="card">
      <h2 style="margin-bottom: 1.2rem; font-size: 1.3rem">Historial en la Nube</h2>
      <div id="stats-container"></div>
      <button class="btn btn-secondary" style="margin-top: 1.5rem; width: 100%" onclick="resetStats()">Borrar Historial</button>
    </div>
  </section>

</div>

<nav>
  <button class="nav-btn active" onclick="showScreen('upload')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    Importar
  </button>
  <button class="nav-btn" onclick="showScreen('topics')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5V4.5z"/></svg>
    Temario
  </button>
  <button class="nav-btn" onclick="showScreen('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Progreso
  </button>
</nav>

<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-text" style="margin: 1rem 0; font-size:0.9rem; line-height:1.4"></div>
    <button class="btn btn-primary" onclick="closeModal()">Entendido</button>
  </div>
</div>

<!-- FIREBASE & GOOGLE SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = JSON.parse(__firebase_config);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'entrenador-opos';
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let topics = [];
  let selectedTopicIds = new Set();
  let currentQuiz = { questions: [], currentIndex: 0, score: 0, originalTopicIndices: [] };

  const initAuth = async () => {
    updateStatus("Conectando...", "loading");
    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
      await signInWithCustomToken(auth, __initial_auth_token);
    } else {
      await signInAnonymously(auth);
    }
  };

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      updateStatus("Sincronizado", "online");
      syncData();
    } else {
      updateStatus("Sin sesión", "offline");
    }
  });

  initAuth();

  function syncData() {
    if (!currentUser) return;
    const topicsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'topics');
    onSnapshot(topicsRef, (snapshot) => {
      topics = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderTopics();
      if (document.getElementById('screen-stats').classList.contains('active')) renderStats();
    }, (err) => {
      console.error("Error Firestore:", err);
    });
  }

  async function saveTopicCloud(topic) {
    if (!currentUser) return;
    try {
      const topicId = topic.id || topic.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
      const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'topics', topicId);
      await setDoc(docRef, {
        name: topic.name,
        questions: topic.questions,
        attempts: topic.attempts || 0,
        lastScore: topic.lastScore || null,
        updatedAt: Date.now()
      });
    } catch (e) { console.error("Error guardando:", e); }
  }

  async function deleteTopicCloud(topicId) {
    if (!currentUser) return;
    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'topics', topicId);
    await deleteDoc(docRef);
  }

  window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav .nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    
    const navBtns = document.querySelectorAll('nav .nav-btn');
    const map = { upload: 0, topics: 1, stats: 2 };
    if (map[id] !== undefined) navBtns[map[id]].classList.add('active');

    if (id === 'topics') renderTopics();
    if (id === 'stats') renderStats();
  };

  window.handleFiles = (fileList) => {
    Array.from(fileList).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => processContent(file.name, e.target.result);
      reader.readAsText(file);
    });
  };

  function processContent(fileName, text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 10);
    const name = fileName.replace('.txt', '');
    const questions = lines.map(line => {
      const p = line.split('|').map(s => s.trim());
      if (p.length < 7) return null;
      return { text: p[1], options: [p[2], p[3], p[4], p[5]], correct: p[6].toUpperCase(), explanation: p[7] || "" };
    }).filter(q => q !== null);

    if (questions.length > 0) {
      saveTopicCloud({ name, questions });
      showScreen('topics');
    }
  }

  function renderTopics() {
    const list = document.getElementById('topics-list');
    const msg = document.getElementById('no-topics-msg');
    const content = document.getElementById('topics-content');

    if (topics.length === 0) {
      msg.style.display = 'block'; content.style.display = 'none';
      return;
    }

    msg.style.display = 'none'; content.style.display = 'block';
    
    list.innerHTML = topics.map((t) => `
      <div class="topic-item">
        <input type="checkbox" class="topic-checkbox" data-id="${t.id}" ${selectedTopicIds.has(t.id) ? 'checked' : ''}>
        <div class="topic-content">
          <h3>${t.name}</h3>
          <p style="font-size:0.8rem; color:var(--text-muted)">${t.questions.length} preguntas • ${t.attempts} veces hecho</p>
        </div>
        <button class="btn btn-outline" style="padding:0.5rem" onclick="window.deleteTopic('${t.id}')">🗑️</button>
      </div>
    `).join('');

    // Listeners para checkboxes
    document.querySelectorAll('.topic-checkbox').forEach(cb => {
      cb.addEventListener('change', (e) => {
        const id = e.target.dataset.id;
        if (e.target.checked) selectedTopicIds.add(id);
        else selectedTopicIds.delete(id);
        updateSelectionUI();
      });
    });

    updateSelectionUI();
  }

  function updateSelectionUI() {
    const countLabel = document.getElementById('selected-count');
    const configPanel = document.getElementById('quiz-config-panel');
    const numInput = document.getElementById('num-questions');
    const maxLabel = document.getElementById('max-available');
    
    const count = selectedTopicIds.size;
    countLabel.innerText = `${count} tema${count !== 1 ? 's' : ''} seleccionado${count !== 1 ? 's' : ''}`;
    
    if (count > 0) {
      configPanel.style.display = 'block';
      let totalQ = 0;
      topics.filter(t => selectedTopicIds.has(t.id)).forEach(t => totalQ += t.questions.length);
      maxLabel.innerText = `Máximo: ${totalQ} preguntas`;
      numInput.max = totalQ;
      if (parseInt(numInput.value) > totalQ) numInput.value = totalQ;
    } else {
      configPanel.style.display = 'none';
    }
  }

  window.toggleSelectAll = () => {
    if (selectedTopicIds.size === topics.length) {
      selectedTopicIds.clear();
    } else {
      topics.forEach(t => selectedTopicIds.add(t.id));
    }
    renderTopics();
  };

  window.deleteTopic = async (id) => {
    if (confirm("¿Eliminar este tema de la nube?")) {
      selectedTopicIds.delete(id);
      await deleteTopicCloud(id);
    }
  };

  window.startCustomQuiz = () => {
    const numRequested = parseInt(document.getElementById('num-questions').value) || 10;
    const selectedTopics = topics.filter(t => selectedTopicIds.has(t.id));
    
    let pool = [];
    selectedTopics.forEach((t, idx) => {
      // Guardamos el indice original para actualizar stats luego
      const qs = t.questions.map(q => ({ ...q, sourceTopicId: t.id }));
      pool = [...pool, ...qs];
    });

    if (pool.length === 0) return;

    currentQuiz = { 
      questions: shuffle(pool).slice(0, numRequested), 
      currentIndex: 0, 
      score: 0,
      topicIdsInvolved: Array.from(selectedTopicIds)
    };

    const nameDisplay = selectedTopics.length === 1 ? selectedTopics[0].name : "Mix Personalizado";
    document.getElementById('quiz-topic-name').innerText = nameDisplay;
    showScreen('quiz');
    showQuestion();
  };

  function showQuestion() {
    const q = currentQuiz.questions[currentQuiz.currentIndex];
    document.getElementById('quiz-progress').innerText = `${currentQuiz.currentIndex + 1} / ${currentQuiz.questions.length}`;
    document.getElementById('q-text').innerText = q.text;
    
    const optDiv = document.getElementById('q-options');
    optDiv.innerHTML = '';
    ['A','B','C','D'].forEach((l, i) => {
      const b = document.createElement('button');
      b.className = 'option-btn';
      b.innerHTML = `<strong>${l}.</strong> ${q.options[i]}`;
      b.onclick = () => checkAnswer(l, b);
      optDiv.appendChild(b);
    });

    document.getElementById('q-feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  function checkAnswer(letter, btn) {
    const q = currentQuiz.questions[currentQuiz.currentIndex];
    const btns = document.querySelectorAll('.option-btn');
    const feed = document.getElementById('q-feedback');
    btns.forEach(b => b.disabled = true);

    const correct = letter === q.correct;
    if (correct) {
      btn.classList.add('correct');
      currentQuiz.score++;
      feed.className = 'feedback show is-correct';
      feed.innerHTML = `<strong>¡Correcto!</strong><br>${q.explanation}`;
    } else {
      btn.classList.add('wrong');
      const idx = ['A','B','C','D'].indexOf(q.correct);
      if (btns[idx]) btns[idx].classList.add('correct');
      feed.className = 'feedback show is-wrong';
      feed.innerHTML = `<strong>Incorrecto.</strong> Era la ${q.correct}.<br>${q.explanation}`;
    }
    feed.style.display = 'block';
    document.getElementById('next-btn').style.display = 'inline-flex';
  }

  window.nextQuestion = () => {
    currentQuiz.currentIndex++;
    if (currentQuiz.currentIndex < currentQuiz.questions.length) showQuestion();
    else finishQuiz();
  };

  async function finishQuiz() {
    const finalPercent = (currentQuiz.score / currentQuiz.questions.length) * 100;
    
    // Actualizar intentos en todos los temas involucrados
    for (const tid of currentQuiz.topicIdsInvolved) {
      const topic = topics.find(t => t.id === tid);
      if (topic) {
        topic.attempts++;
        // Solo actualizamos la nota si es un test de ese tema específico, 
        // o la mantenemos como "nota del último mix" si prefieres.
        // Aquí actualizaremos la nota global de ese tema con este resultado.
        topic.lastScore = finalPercent; 
        await saveTopicCloud(topic);
      }
    }

    openModal("Test Finalizado", `Resultado: ${currentQuiz.score} aciertos de ${currentQuiz.questions.length}.<br>Puntuación media: <strong>${finalPercent.toFixed(0)}%</strong>`);
    showScreen('stats');
  }

  function renderStats() {
    const container = document.getElementById('stats-container');
    if (topics.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted); text-align:center">Sin datos registrados.</p>';
      return;
    }
    container.innerHTML = topics.map(t => {
      const color = t.lastScore === null ? 'var(--text-muted)' : (t.lastScore >= 50 ? 'var(--success)' : 'var(--error)');
      return `
        <div style="background:var(--surface2); padding:1rem; border-radius:8px; border-left:4px solid ${color}; margin-bottom:0.8rem">
          <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.9rem">
            <strong>${t.name}</strong>
            <span style="color:${color}">${t.lastScore !== null ? t.lastScore.toFixed(0)+'%' : '--'}</span>
          </div>
          <div style="height:4px; background:var(--border); border-radius:2px; overflow:hidden">
            <div style="width:${t.lastScore || 0}%; height:100%; background:${color}"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.resetStats = async () => {
    if (confirm("¿Quieres poner a cero todos tus intentos?")) {
      for (let t of topics) {
        t.attempts = 0; t.lastScore = null;
        await saveTopicCloud(t);
      }
    }
  };

  function updateStatus(text, type) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    label.innerText = text;
    dot.className = 'dot ' + type;
  }

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  window.openModal = (title, text) => {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-text').innerHTML = text;
    document.getElementById('modal-overlay').style.display = 'flex';
  };
  window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

</script>
